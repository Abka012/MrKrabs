name: Alpaca Trade Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "00 14 * * 1-5"

concurrency:
  group: alpaca-trade-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ALPACA_URL: ${{ secrets.ALPACA_URL }}
      ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Alpaca secrets
        run: |
          test -n "$ALPACA_URL"
          test -n "$ALPACA_KEY"
          test -n "$ALPACA_SECRET"

      - name: Run trading bot
        run: python alpaca_trader.py --all --mode auto
